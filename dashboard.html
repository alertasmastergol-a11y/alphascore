<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlphaScore Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body style="margin:0;font-family:Arial;background:#020617;color:white;">
  <h1 style="text-align:center;color:#22c55e;">Dashboard AlphaScore</h1>
  <div style="padding:16px;">
    <canvas id="chart"></canvas>
  </div>

  <script>
    new Chart(document.getElementById("chart"), {
      type: "line",
      data: {
        labels: ["Seg", "Ter", "Qua", "Qui", "Sex", "Sáb", "Dom"],
        datasets: [{
          label: "Visitas",
          data: [12, 19, 14, 26, 31, 28, 40]
        }]
      }
    });
  </script>
</body>
</html>
